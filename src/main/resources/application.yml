server:
  port: 8080

spring:
  datasource:
    url: jdbc:sqlite:data/hotsearch.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

jwt:
  secret: ${JWT_SECRET:WeiboHotSearchServiceSecretKey2024MustBeLongEnoughForHS256}
  expiration-ms: 86400000

app:
  schedule:
    cron: "0 0 * * * *"
  dedupe:
    window-hours: 6
  fetcher:
    user-agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36"
    timeout-seconds: 15
    # Optional: paste your Weibo cookie here if 403 persists
    # cookie: "SUB=your_sub_cookie_value_here"

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
